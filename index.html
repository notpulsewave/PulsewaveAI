<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseWaveAI</title>

<style>
:root{
    --bg:#090909;
    --card:#141414;
    --red:#ff1a1a;
    --red2:#b30000;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,#050505,#140000,#050505);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1000px;
    height:90vh;
    background:rgba(20,20,20,.95);
    border:2px solid var(--red);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(255,0,0,.4);
    display:flex;
    flex-direction:column;
}

.header{
    background:linear-gradient(90deg,var(--red2),var(--red));
    padding:20px;
    text-align:center;
}

.header h1{
    font-size:2rem;
}

.creator{
    opacity:.85;
}

.chat{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.message{
    padding:12px 15px;
    border-radius:15px;
    margin-bottom:12px;
    max-width:80%;
}

.user{
    background:#ff1a1a;
    margin-left:auto;
}

.bot{
    background:#222;
    border:1px solid #ff1a1a;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#222;
    color:white;
}

button{
    background:linear-gradient(90deg,#990000,#ff1a1a);
    border:none;
    color:white;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.api-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:flex;
    justify-content:center;
    align-items:center;
}

.api-box{
    background:#111;
    padding:30px;
    border:2px solid red;
    border-radius:20px;
    width:400px;
    text-align:center;
}

.glow{
    text-shadow:0 0 15px red;
}
</style>
</head>
<body>

<div class="api-modal" id="apiModal">
    <div class="api-box">
        <h2 class="glow">PulseWaveAI</h2>
        <p>Enter your API Key</p>
        <br>
        <input id="apiKeyInput" type="password" placeholder="API Key">
        <br><br>
        <button onclick="saveKey()">Save Key</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1 class="glow">PulseWaveAI</h1>
        <div class="creator">Made by NotPulseWave_YT</div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input id="prompt" placeholder="Message PulseWaveAI...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const modal = document.getElementById("apiModal");

if(localStorage.getItem("pulsewave_api_key")){
    modal.style.display="none";
}

function saveKey(){
    const key = document.getElementById("apiKeyInput").value.trim();

    if(!key){
        alert("Enter an API key.");
        return;
    }

    localStorage.setItem("pulsewave_api_key", key);
    modal.style.display="none";
}

function addMessage(text,type){
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = `message ${type}`;
    msg.textContent = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("prompt");
    const message = input.value.trim();

    if(!message) return;

    addMessage(message,"user");
    input.value="";

    const apiKey = localStorage.getItem("pulsewave_api_key");

    try{

        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Authorization":"Bearer " + apiKey,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    model:"openai/gpt-4o-mini",
                    messages:[
                        {
                            role:"user",
                            content:message
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        if(data.error){
            addMessage("Error: " + data.error.message,"bot");
            return;
        }

        addMessage(
            data.choices[0].message.content,
            "bot"
        );

    } catch(err){
        addMessage("Request failed: " + err.message,"bot");
    }
}
</script>

</body>
</html>
