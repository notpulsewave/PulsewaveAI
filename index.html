<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseWaveAI</title>

<style>
:root{
    --bg:#080808;
    --card:#141414;
    --red:#ff1a1a;
    --darkred:#8b0000;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background: radial-gradient(circle at top,#330000,#080808 60%);
    color:white;
    display:flex;
    overflow:hidden;
}

.sidebar {
    width: 260px;
    background: #0a0a0a;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.new-chat-btn {
    margin: 12px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #8b0000, #ff1a1a);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.new-chat-btn:hover { filter: brightness(1.15); }

.chat-list { flex: 1; overflow-y: auto; padding: 8px; }

.chat-item {
    padding: 12px 16px;
    margin: 4px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-item:hover { background: #1f1f1f; }
.chat-item.active { background: #ff1a1a; color: black; font-weight: 600; }

.chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.delete-btn {
    opacity: 0.6; padding: 4px 8px; font-size: 1.1rem;
    background: none; border: none; color: #ff5555; cursor: pointer;
}
.delete-btn:hover { opacity: 1; color: #ff1a1a; }

.main { flex: 1; display: flex; flex-direction: column; }

.header{
    padding: 12px 20px;
    background: linear-gradient(90deg, #550000, #ff1a1a);
    box-shadow: 0 0 15px rgba(255,0,0,.4);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.header h1{ font-size: 1.4rem; text-shadow: 0 0 15px red; }

.chat{
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: var(--bg);
}

.message{
    max-width: 75%;
    margin-bottom: 18px;
    padding: 13px 17px;
    border-radius: 16px;
    line-height: 1.5;
    word-wrap: break-word;
}

.user{ background: #ff1a1a; margin-left: auto; color: white; }
.bot{ background: #1b1b1b; border: 1px solid #ff1a1a; }

.code-container{
    position:relative;
    margin: 12px 0;
    border: 1px solid #ff1a1a;
    border-radius: 12px;
    background: #0d0d0d;
    overflow: hidden;
}

.code-actions {
    position:absolute;
    top:8px;
    right:8px;
    z-index: 10;
}

.code-copy {
    padding:5px 11px;
    border:none;
    border-radius:6px;
    font-size:0.78rem;
    cursor:pointer;
    font-weight: bold;
    background:#ff1a1a;
    color:white;
}

pre{
    background:#0d0d0d;
    padding:15px;
    overflow-x:auto;
    margin:0;
    border-radius: 0 0 12px 12px;
    margin-top: 38px;
}

code{
    font-family: Consolas, monospace;
    white-space: pre;
}

.input-area{
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    background: #111;
    border-top: 1px solid #222;
}

.input-area input{
    flex: 1;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: #1f1f1f;
    color: white;
    outline: none;
}

.input-area button{
    padding: 0 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(90deg, #8b0000, #ff1a1a);
    color: white;
    font-weight: bold;
}

.api-modal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.94);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.api-box{
    width: 400px;
    max-width: 90%;
    background: #111;
    border: 2px solid red;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 35px rgba(255,0,0,.4);
}
</style>
</head>
<body>

<div class="api-modal" id="apiModal">
    <div class="api-box">
        <h2>PulseWaveAI</h2>
        <p>Enter your OpenRouter API Key</p>
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
        <button onclick="saveKey()">Save API Key</button>
        <p style="margin-top:15px; font-size:0.85rem; opacity:0.8;">
            Your key will be saved locally in your browser.
        </p>
    </div>
</div>

<div class="sidebar">
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="chat-list" id="chatList"></div>
</div>

<div class="main">
    <div class="header">
        <div class="header-left">
            <h1>PulseWaveAI</h1>
            <div class="creator">by NotPulseWave_YT</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="keyStatus">Checking API key...</div>
            <button class="reset-btn" onclick="resetApiKey()">Reset Key</button>
        </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input id="prompt" placeholder="Message PulseWaveAI..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// ==================== STATE ====================
let chats = [];
let currentChatId = null;

// ==================== LOCALSTORAGE ====================
function loadChats() {
    const saved = localStorage.getItem("pulsewave_chats");
    chats = saved ? JSON.parse(saved) : [];
    if (chats.length === 0) newChat(true);
    else currentChatId = chats[0].id;
    renderChatList();
    loadCurrentChat();
}

function saveChats() {
    localStorage.setItem("pulsewave_chats", JSON.stringify(chats));
}

function generateId() {
    return 'chat-' + Date.now().toString(36) + Math.random().toString(36).substr(2);
}

// ==================== CHAT MANAGEMENT ====================
function renderChatList() {
    const container = document.getElementById("chatList");
    container.innerHTML = "";
    chats.forEach(chat => {
        const el = document.createElement("div");
        el.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
        el.innerHTML = `
            <div class="chat-title">${chat.title || "New Chat"}</div>
            <button class="delete-btn" onclick="event.stopImmediatePropagation(); deleteChat('${chat.id}')">×</button>
        `;
        el.onclick = (e) => {
            if (e.target.classList.contains('delete-btn')) return;
            switchChat(chat.id);
        };
        container.appendChild(el);
    });
}

function deleteChat(id) {
    if (!confirm("Delete this chat?")) return;
    const index = chats.findIndex(c => c.id === id);
    if (index === -1) return;
    chats.splice(index, 1);
    if (currentChatId === id) {
        currentChatId = chats.length > 0 ? chats[0].id : null;
        if (!currentChatId) newChat(true);
    }
    saveChats();
    renderChatList();
    loadCurrentChat();
}

function switchChat(id) {
    currentChatId = id;
    renderChatList();
    loadCurrentChat();
}

function newChat(silent = false) {
    const newChatObj = {
        id: generateId(),
        title: "New Chat",
        messages: [{
            role: "system",
            content: `You are PulseWaveAI, created by NotPulseWave_YT.
CRITICAL: If asked who made you, always say "I was made by NotPulseWave_YT."
Use provided weather data when available.`
        }]
    };
    chats.unshift(newChatObj);
    currentChatId = newChatObj.id;
    saveChats();
    renderChatList();
    loadCurrentChat();
    if (!silent) addMessage("New chat started. How can I help you today?", "bot");
}

function loadCurrentChat() {
    const chat = chats.find(c => c.id === currentChatId);
    if (!chat) return;
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";
    chat.messages.forEach(msg => {
        if (msg.role !== "system") addMessage(msg.content, msg.role === "user" ? "user" : "bot");
    });
}

// ==================== MESSAGES ====================
function addMessage(text, type) {
    const chatDiv = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = `message ${type}`;

    let processedText = text.replace(/```(?:html|HTML)?\s*([\s\S]*?)```/g, function(match, code) {
        const escaped = code.trim()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        return `
            <div class="code-container">
                <div class="code-actions">
                    <button class="code-copy" onclick="copyCode(this)">Copy</button>
                </div>
                <pre><code>${escaped}</code></pre>
            </div>
        `;
    });

    msg.innerHTML = processedText.replace(/\n/g, '<br>');
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return msg;
}

function copyCode(button) {
    const container = button.closest('.code-container');
    const code = container.querySelector("code").innerText;
    navigator.clipboard.writeText(code);
    button.innerText = "Copied!";
    setTimeout(() => button.innerText = "Copy", 1500);
}

// ==================== WEATHER ====================
async function getWeather(city = null) {
    try {
        let url = "https://api.open-meteo.com/v1/forecast?";
        if (city) {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
            const geo = await geoRes.json();
            if (!geo.results?.[0]) return null;
            const loc = geo.results[0];
            url += `latitude=${loc.latitude}&longitude=${loc.longitude}`;
        } else {
            url += `latitude=-35.2809&longitude=149.1300`;
        }
        url += `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code&timezone=auto`;

        const res = await fetch(url);
        const data = await res.json();
        const w = data.current;

        const conditions = {0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",61:"Rain",71:"Snow",95:"Thunderstorm"};
        return `Current weather in ${city || "Canberra"}:\nTemperature: ${w.temperature_2m}°C (feels like ${w.apparent_temperature}°C)\nCondition: ${conditions[w.weather_code] || "Unknown"}\nHumidity: ${w.relative_humidity_2m}%`;
    } catch (e) {
        return null;
    }
}

// ==================== SEND MESSAGE ====================
async function sendMessage() {
    const input = document.getElementById("prompt");
    const messageText = input.value.trim();
    if (!messageText) return;

    const apiKey = localStorage.getItem("pulsewave_api_key");
    if (!apiKey) {
        alert("Please enter an API key first.");
        document.getElementById("apiModal").style.display = "flex";
        return;
    }

    addMessage(messageText, "user");
    input.value = "";

    const currentChat = chats.find(c => c.id === currentChatId);
    currentChat.messages.push({ role: "user", content: messageText });
    saveChats();

    if (currentChat.messages.length === 2) {
        currentChat.title = messageText.substring(0, 40) + (messageText.length > 40 ? "..." : "");
        renderChatList();
    }

    const botMessage = addMessage("PulseWaveAI is thinking...", "bot");

    let weatherData = null;
    const lowerMsg = messageText.toLowerCase();
    if (lowerMsg.includes("weather") || lowerMsg.includes("temperature") || lowerMsg.includes("rain")) {
        const cityMatch = messageText.match(/(?:in|for|at)\s+([A-Za-z\s]+)/i);
        const city = cityMatch ? cityMatch[1].trim() : "Canberra";
        weatherData = await getWeather(city);
    }

    try {
        let messagesToSend = [...currentChat.messages];
        if (weatherData) {
            messagesToSend.push({ role: "system", content: `REAL-TIME WEATHER INFO: ${weatherData}\nUse this accurate data.` });
        }

        const response = await fetch("https://apihub.agnes-ai.com/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "agnes-2.0-flash",
                messages: messagesToSend,
                stream: true
            })
        });

        if (!response.ok) throw new Error("API error");

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let botReply = "";

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');
            for (const line of lines) {
                if (line.startsWith("data: ") && !line.includes("[DONE]")) {
                    try {
                        const parsed = JSON.parse(line.slice(6));
                        const content = parsed.choices?.[0]?.delta?.content || "";
                        if (content) {
                            botReply += content;
                            botMessage.innerHTML = botReply.replace(/\n/g, '<br>');
                            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                        }
                    } catch (e) {}
                }
            }
        }

        currentChat.messages.push({ role: "assistant", content: botReply });
        saveChats();

    } catch (error) {
        botMessage.innerHTML = "Sorry, I couldn't get a response.";
    }
}

// ==================== API KEY ====================
function saveKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) return alert("Please enter an API key.");
    localStorage.setItem("pulsewave_api_key", key);
    document.getElementById("apiModal").style.display = "none";
    updateKeyStatus();
    addMessage("✅ API Key saved successfully!", "bot");
}

function resetApiKey() {
    if (!confirm("Remove saved API key?")) return;
    localStorage.removeItem("pulsewave_api_key");
    document.getElementById("apiModal").style.display = "flex";
    updateKeyStatus();
}

function updateKeyStatus() {
    const key = localStorage.getItem("pulsewave_api_key");
    document.getElementById("keyStatus").textContent = key ? "API Key Loaded ✓" : "No API Key";
}

// ==================== INIT ====================
if (!localStorage.getItem("pulsewave_api_key")) {
    document.getElementById("apiModal").style.display = "flex";
}
updateKeyStatus();
loadChats();

document.getElementById("prompt").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
