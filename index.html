<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseWaveAI</title>

<style>
:root{
    --bg:#080808;
    --card:#141414;
    --red:#ff1a1a;
    --darkred:#8b0000;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:
        radial-gradient(circle at top,#330000,#080808 60%);
    color:white;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    text-align:center;
    padding:20px;
    background:linear-gradient(
        90deg,
        #550000,
        #ff1a1a
    );
    box-shadow:0 0 25px rgba(255,0,0,.4);
}

.header h1{
    font-size:2rem;
    text-shadow:0 0 20px red;
}

.creator{
    margin-top:5px;
    opacity:.9;
}

#keyStatus{
    margin-top:10px;
    font-size:.9rem;
    color:#ffd5d5;
}

.reset-btn{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    border:1px solid #ff1a1a;
    cursor:pointer;
    transition:.25s;
}

.reset-btn:hover{
    background:#ff1a1a;
    box-shadow:0 0 15px red;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    margin-bottom:15px;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.5;
    word-wrap:break-word;
}

.user{
    background:#ff1a1a;
    margin-left:auto;
}

.bot{
    background:#1b1b1b;
    border:1px solid #ff1a1a;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    background:#111;
    border-top:1px solid #222;
}

.input-area input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1f1f1f;
    color:white;
    outline:none;
}

.input-area button{
    padding:15px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(
        90deg,
        #8b0000,
        #ff1a1a
    );
    color:white;
    font-weight:bold;
}

.input-area button:hover{
    filter:brightness(1.15);
}

.api-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.api-box{
    width:400px;
    max-width:90%;
    background:#111;
    border:2px solid red;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 35px rgba(255,0,0,.4);
}

.api-box h2{
    margin-bottom:15px;
    text-shadow:0 0 15px red;
}

.api-box input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

.api-box button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(
        90deg,
        #8b0000,
        #ff1a1a
    );
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.typing{
    opacity:.7;
    font-style:italic;
}
</style>
</head>
<body>

<div class="api-modal" id="apiModal">
    <div class="api-box">
        <h2>PulseWaveAI</h2>
        <p>Enter your OpenRouter API Key</p>

        <input
            type="password"
            id="apiKeyInput"
            placeholder="sk-or-v1-..."
        >

        <button onclick="saveKey()">
            Save API Key
        </button>
    </div>
</div>

<div class="container">

    <div class="header">
        <h1>PulseWaveAI</h1>

        <div class="creator">
            Made by NotPulseWave_YT
        </div>

        <div id="keyStatus">
            Checking API key...
        </div>

        <button
            class="reset-btn"
            onclick="resetApiKey()">
            Reset API Key
        </button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input
            id="prompt"
            placeholder="Message PulseWaveAI..."
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

const modal =
document.getElementById("apiModal");

function updateKeyStatus(){

    const key =
    localStorage.getItem(
        "pulsewave_api_key"
    );

    const status =
    document.getElementById(
        "keyStatus"
    );

    if(key){
        status.textContent =
        "API Key Loaded ✓";
    }else{
        status.textContent =
        "No API Key Loaded";
    }
}

if(
    localStorage.getItem(
        "pulsewave_api_key"
    )
){
    modal.style.display="none";
}

updateKeyStatus();

function saveKey(){

    const key =
    document
    .getElementById(
        "apiKeyInput"
    )
    .value
    .trim();

    if(!key){
        alert(
            "Please enter an API key."
        );
        return;
    }

    localStorage.setItem(
        "pulsewave_api_key",
        key
    );

    modal.style.display="none";

    updateKeyStatus();

    addMessage(
        "PulseWaveAI is ready.",
        "bot"
    );
}

function resetApiKey(){

    const confirmReset =
    confirm(
        "Remove the saved API key?"
    );

    if(!confirmReset) return;

    localStorage.removeItem(
        "pulsewave_api_key"
    );

    document
    .getElementById(
        "apiKeyInput"
    )
    .value = "";

    modal.style.display="flex";

    updateKeyStatus();
}

function addMessage(
    text,
    type
){

    const chat =
    document.getElementById(
        "chat"
    );

    const msg =
    document.createElement(
        "div"
    );

    msg.className =
    `message ${type}`;

    msg.textContent = text;

    chat.appendChild(msg);

    chat.scrollTop =
    chat.scrollHeight;

    return msg;
}

async function sendMessage(){

    const input =
    document.getElementById(
        "prompt"
    );

    const message =
    input.value.trim();

    if(!message) return;

    const apiKey =
    localStorage.getItem(
        "pulsewave_api_key"
    );

    if(!apiKey){

        alert(
            "Please enter an API key first."
        );

        modal.style.display="flex";

        return;
    }

    addMessage(
        message,
        "user"
    );

    input.value="";

    const typing =
    addMessage(
        "PulseWaveAI is thinking...",
        "bot"
    );

    typing.classList.add(
        "typing"
    );

    try{

        const response =
        await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method:"POST",

                headers:{
                    "Authorization":
                    "Bearer " +
                    apiKey,

                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    model:
                    "openai/gpt-4o-mini",

                    messages:[
                        {
                            role:"user",
                            content:message
                        }
                    ]
                })
            }
        );

        const data =
        await response.json();

        typing.remove();

        if(data.error){

            addMessage(
                "Error: " +
                data.error.message,
                "bot"
            );

            return;
        }

        addMessage(
            data.choices[0]
            .message.content,
            "bot"
        );

    }catch(error){

        typing.remove();

        addMessage(
            "Request failed: " +
            error.message,
            "bot"
        );
    }
}

document
.getElementById("prompt")
.addEventListener(
    "keydown",
    function(e){

        if(
            e.key === "Enter"
        ){
            sendMessage();
        }
    }
);

</script>

</body>
</html>
