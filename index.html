<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PulseWaveAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse-border { border: 1px solid #dc2626; box-shadow: 0 0 10px rgba(220, 38, 38, 0.4); }
    </style>
</head>
<body class="bg-black text-red-500 min-h-screen p-4 font-sans">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 border-b border-red-600 pb-4">
            <h1 class="text-3xl font-black tracking-tighter text-white">PULSEWAVE<span class="text-red-600">AI</span></h1>
            <p class="text-xs text-red-500 uppercase tracking-widest">Developed by NotPulseWave_YT</p>
        </header>

        <div id="chat" class="h-[60vh] overflow-y-auto bg-black p-4 rounded-lg mb-4 space-y-4 pulse-border">
            <div class="text-red-600 italic text-sm">System ready. Enter your prompt to begin.</div>
        </div>
        
        <div class="flex gap-2">
            <select id="modelSelect" class="bg-black p-2 rounded pulse-border text-white">
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5</option>
            </select>
            <input type="text" id="input" class="flex-1 bg-black p-3 rounded pulse-border text-white" placeholder="Pulse input...">
            <button onclick="sendMessage()" class="bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-500 transition">INITIATE</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            var input = document.getElementById('input');
            var chat = document.getElementById('chat');
            var model = document.getElementById('modelSelect').value;
            var key = localStorage.getItem('or_key');

            if (!key) {
                key = prompt("PULSEWAVE SYSTEM: Enter OpenRouter API Key:");
                localStorage.setItem('or_key', key);
            }

            if (!input.value) return;

            // Using standard concatenation instead of backticks
            chat.innerHTML += '<div class="text-right text-white"><b>YOU:</b> ' + input.value + '</div>';
            var userMsg = input.value;
            input.value = '';

            fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + key,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": model,
                    "messages": [{"role": "user", "content": userMsg}]
                })
            })
            .then(response => response.json())
            .then(data => {
                var aiResponse = data.choices[0].message.content;
                chat.innerHTML += '<div class="bg-red-600 p-3 rounded text-white"><b>PULSEWAVE:</b> ' + aiResponse + '</div>';
                chat.scrollTop = chat.scrollHeight;
            })
            .catch(err => {
                chat.innerHTML += '<div class="text-red-500">SYSTEM ERROR: Connection failed. Check API Key.</div>';
            });
        }
    </script>
</body>
</html>
