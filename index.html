<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zenith Multi-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">Zenith Gateway</h1>
            <select id="modelSelect" class="bg-gray-800 p-2 rounded border border-gray-700">
                <option value="openai/gpt-4o">GPT-4o (OpenAI)</option>
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                <option value="google/gemini-pro-1.5">Gemini 1.5 Pro</option>
                <option value="meta-llama/llama-3.1-405b">Llama 3.1 405B</option>
            </select>
        </div>
        
        <div id="chat" class="h-[60vh] overflow-y-auto bg-gray-800 p-4 rounded-lg mb-4 space-y-4"></div>
        
        <div class="flex gap-2">
            <input type="text" id="input" class="flex-1 bg-gray-800 p-3 rounded border border-gray-700" placeholder="Ask anything...">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 py-2 rounded font-bold hover:bg-blue-500">Send</button>
        </div>
    </div>

    <script>
        // Securely handle key via local storage
        function getApiKey() {
            let key = localStorage.getItem('or_key');
            if (!key) {
                key = prompt("Enter your OpenRouter API Key (Saved in browser only):");
                localStorage.setItem('or_key', key);
            }
            return key;
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            const model = document.getElementById('modelSelect').value;
            
            if (!input.value) return;

            chat.innerHTML += `<div class="text-right"><b>You:</b> {input.value}</div>`;
            const userMsg = input.value;
            input.value = '';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer {getApiKey()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{role: "user", content: userMsg}]
                    })
                });
                
                const data = await response.json();
                chat.innerHTML += `<div class="bg-gray-700 p-2 rounded"><b>{model}:</b> {data.choices[0].message.content}</div>`;
            } catch (err) {
                alert("Error: Key might be invalid or network issue.");
            }
        }
    </script>
</body>
</html>
