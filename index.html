<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; background: #f4f4f9; }
        #chat { height: 400px; overflow-y: scroll; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; }
        .user { background: #e3f2fd; text-align: right; }
        .ai { background: #f5f5f5; }
        #controls { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<h3>ZenithAI Local Client</h3>
<div id="chat"></div>
<div id="controls">
    <input type="text" id="input" placeholder="Type a message..." style="flex:1">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    // Paste your key here one time
    const API_KEY = "sk-or-v1-YOUR_KEY_HERE"; 

    async function sendMessage() {
        const input = document.getElementById('input');
        const chat = document.getElementById('chat');
        const text = input.value;
        if (!text) return;

        chat.innerHTML += `<div class="msg user"><b>You:</b> {text}</div>`;
        input.value = '';

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer {API_KEY}`,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://localhost",
                    "X-Title": "ZenithAI"
                },
                body: JSON.stringify({
                    "model": "openai/gpt-4o",
                    "messages": [{"role": "user", "content": text}]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            chat.innerHTML += `<div class="msg ai"><b>AI:</b> {reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        } catch (e) {
            chat.innerHTML += `<div class="msg ai" style="color:red">Error: {e.message}. (Note: If this is a CORS error, you must open this file using a local web server extension).</div>`;
        }
    }
</script>
</body>
</html>
